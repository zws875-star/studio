<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>

  <link rel="stylesheet" href="styles.css?v=6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@400;500&display=swap');

    :root {
      --bg: #F9F7F2;
      --text: #111111;
      --muted: #666666;
      --accent: #3A3A3A;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .serif {
      font-family: 'Noto Serif SC', 'Inter', serif;
    }

    .nav-link {
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: #111111;
    }

    .dark .nav-link:hover {
      color: #ffffff;
    }

    .nav-link:after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: #111111;
      transition: width 0.3s ease;
    }

    .dark .nav-link:after {
      background-color: #ffffff;
    }

    .nav-link:hover:after {
      width: 100%;
    }

    .section-title {
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: #111111;
    }

    .dark .section-title {
      color: #f0f0f0;
    }

    .hero-content > * {
      opacity: 0;
      transform: translateY(20px);
      animation: heroFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
    .hero-content > *:nth-child(2) { animation-delay: 0.25s; }
    .hero-content > *:nth-child(3) { animation-delay: 0.4s; }
    .hero-content > *:nth-child(4) { animation-delay: 0.55s; }

    @keyframes heroFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Status bar for debugging */
    #page-status {
      display: none;
    }
  </style>
</head>
<body class="bg-[#F9F7F2] dark:bg-[#1a1a1a] text-[#111111] dark:text-[#f0f0f0]">

  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-[#F9F7F2]/95 dark:bg-[#1a1a1a]/95 backdrop-blur-md border-b border-[#E5E2D9] dark:border-[#333]">
    <div class="max-w-6xl mx-auto px-8 flex items-center justify-between h-20">
      <div class="flex items-center gap-x-3">
        <a href="index.html" class="site-brand" aria-label="ZWS875 首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="presentation" focusable="false" aria-hidden="true">
              <path class="mark-zs" d="M6 8h29L12 24h28L17 40h25"></path>
              <path class="mark-w" d="M7 8l9 32 8-19 8 19L41 8"></path>
            </svg>
          </span>
          <span class="brand-copy" aria-hidden="true">
            <span class="brand-word">ZWS</span>
            <span class="brand-num">875</span>
          </span>
        </a>
      </div>

      <div class="flex items-center gap-x-9 text-sm">
        <a href="photos.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">照片</a>
        <a href="videos.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">视频</a>
        <a href="blog.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">博客</a>
        <a href="about.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">关于</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero-shell max-w-6xl mx-auto">
    <div class="max-w-3xl hero-content">
      <div class="flex items-center gap-x-3 mb-6">
        <div class="w-2 h-2 bg-[#111111] dark:bg-white rounded-full"></div>
        <span class="uppercase tracking-[3px] text-xs text-[#666666] dark:text-[#888888]">SHANGHAI · CHINA</span>
      </div>

      <h1 class="text-7xl leading-none tracking-tighter font-medium mb-6">
        爱寂寞的人
      </h1>

      <p class="text-2xl text-[#444444] dark:text-[#aaaaaa] leading-tight tracking-tight mb-10 max-w-2xl">
        我用镜头和时间对话。<br>
        摄影 · 视频 · AI 视觉设计
      </p>

      <div class="flex items-center gap-x-4">
        <a href="photos.html" class="minimal-button inline-flex items-center">查看作品</a>
        <a href="about.html" class="text-sm px-5 py-3 text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white transition-colors">了解我</a>
      </div>
    </div>
  </div>

  <!-- Selected Work -->
  <div class="max-w-6xl mx-auto px-8 pb-20">
    <div class="flex items-end justify-between mb-8">
      <div>
        <span class="uppercase tracking-[2px] text-xs text-[#888888] dark:text-[#777777]">SELECTED</span>
        <h2 class="section-title text-3xl tracking-tight">精选作品</h2>
      </div>
      <a href="photos.html" class="text-sm text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white flex items-center gap-x-1 transition-colors">
        查看全部照片 <span>→</span>
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="featured-works"></div>
  </div>

  <!-- Recent Videos -->
  <div class="max-w-6xl mx-auto px-8 pb-20 border-t border-[#E5E2D9] dark:border-[#333] pt-16">
    <div class="flex items-end justify-between mb-8">
      <div>
        <span class="uppercase tracking-[2px] text-xs text-[#888888] dark:text-[#777777]">VIDEO</span>
        <h2 class="section-title text-3xl tracking-tight">最近的视频</h2>
      </div>
      <a href="videos.html" class="text-sm text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white flex items-center gap-x-1 transition-colors">
        全部视频 <span>→</span>
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="recent-videos"></div>
  </div>

  <!-- Recent Blog -->
  <div class="max-w-6xl mx-auto px-8 pb-20 border-t border-[#E5E2D9] dark:border-[#333] pt-16">
    <div class="flex items-end justify-between mb-8">
      <div>
        <span class="uppercase tracking-[2px] text-xs text-[#888888] dark:text-[#777777]">WRITING</span>
        <h2 class="section-title text-3xl tracking-tight">最近的思考</h2>
      </div>
      <a href="blog.html" class="text-sm text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white flex items-center gap-x-1 transition-colors">
        全部博客 <span>→</span>
      </a>
    </div>

    <div class="grid md:grid-cols-2 gap-8" id="recent-posts"></div>
  </div>

  <footer class="border-t border-[#E5E2D9] dark:border-[#333] py-8 text-xs text-[#888888] dark:text-[#777777]">
    <div class="max-w-6xl mx-auto px-8 flex justify-between">
      <div>&copy; ZWS875 2026</div>
      <div>studio2.zws875.com</div>
    </div>
  </footer>

  <script src="main.js?v=4"></script>
  <script>
  // Status tracker visible on page
  document.getElementById('featured-works').innerHTML = '<div class="col-span-full text-center py-12 text-[#888]">加载中...</div>';

  (function() {
    // Load data via XMLHttpRequest (synchronous-style but async)
    function loadJSON(path, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', path + '?t=' + Date.now(), true);
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            callback(Array.isArray(data) ? data : (data && data.list ? data.list : []));
          } catch(e) {
            callback([]);
          }
        } else {
          // Fall back to GitHub while a deployment is still propagating.
          var xhr2 = new XMLHttpRequest();
          xhr2.open('GET', 'https://raw.githubusercontent.com/zws875-star/studio/main/' + path + '?t=' + Date.now(), true);
          xhr2.onload = function() {
            if (xhr2.status === 200) {
              try {
                var data = JSON.parse(xhr2.responseText);
                callback(Array.isArray(data) ? data : (data && data.list ? data.list : []));
              } catch(e) {
                callback([]);
              }
            } else {
              callback([]);
            }
          };
          xhr2.onerror = function() { callback([]); };
          xhr2.send();
        }
      };
      xhr.onerror = function() {
        callback([]);
      };
      xhr.send();
    }

    // Render photos
    loadJSON('data/photos.json', function(items) {
      var g = document.getElementById('featured-works');
      if (!g) return;
      g.innerHTML = '';
      var slice = items.filter(function(item) { return item.published !== false; }).slice(0, 3);
      if (slice.length === 0) {
        g.innerHTML = '<div class="col-span-full text-center py-12 text-[#888]">暂无照片</div>';
        return;
      }
      for (var i = 0; i < slice.length; i++) {
        var p = slice[i];
        var d = document.createElement('div');
        d.style.cssText = 'aspect-ratio:16/10;background:#f1f1f1;border-radius:8px;overflow:hidden;cursor:pointer;';
        var img = document.createElement('img');
        img.src = window.ZWS ? ZWS.assetUrl(p.url || p.mediaUrl || '') : (p.url || p.mediaUrl || '');
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.alt = p.caption || '';
        img.loading = 'lazy';
        d.appendChild(img);
        d.onclick = function() { window.location.href = 'photos.html'; };
        g.appendChild(d);
      }
    });

    // Render videos
    loadJSON('data/videos.json', function(items) {
      var g = document.getElementById('recent-videos');
      if (!g) return;
      g.innerHTML = '';
      var slice = items.filter(function(item) { return item.published !== false; }).slice(0, 3);
      if (slice.length === 0) {
        g.innerHTML = '<div class="col-span-full text-center py-12 text-[#888]">暂无视频</div>';
        return;
      }
      for (var i = 0; i < slice.length; i++) {
        let v = slice[i];
        var d = document.createElement('div');
        d.className = 'group cursor-pointer reveal revealed';
        var html = '<div class="relative aspect-video bg-zinc-900 dark:bg-zinc-800 rounded overflow-hidden mb-3">';
        if (v.thumbnail) {
          var thumbnailUrl = window.ZWS ? ZWS.assetUrl(v.thumbnail) : v.thumbnail;
          html += '<img src="' + thumbnailUrl.replace(/"/g, '') + '" class="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-500" alt="" loading="lazy">';
        }
        html += '<div class="absolute inset-0 flex items-center justify-center"><div class="w-12 h-12 rounded-full bg-white/90 flex items-center justify-center transition-transform group-hover:scale-110"><div class="w-0 h-0 border-l-[15px] border-l-black border-t-[8px] border-t-transparent border-b-[8px] border-b-transparent ml-1"></div></div></div></div>';
        html += '<div class="font-medium tracking-tight">' + (v.title || '').replace(/</g, '&lt;') + '</div>';
        html += '<div class="text-sm text-[#666] dark:text-[#aaa] mt-1 line-clamp-2">' + (v.description || '').replace(/</g, '&lt;') + '</div>';
        d.innerHTML = html;
        d.onclick = function() {
          if (window.ZWS && ZWS.openVideoModal) {
            ZWS.openVideoModal(ZWS.videoUrl(v), v.title);
          }
        };
        g.appendChild(d);
      }
    });

    // Render posts
    loadJSON('data/posts.json', function(items) {
      var g = document.getElementById('recent-posts');
      if (!g) return;
      g.innerHTML = '';
      var slice = items.filter(function(item) { return item.published !== false; }).slice(0, 2);
      if (slice.length === 0) {
        g.innerHTML = '<div class="col-span-full text-center py-12 text-[#888]">暂无文章</div>';
        return;
      }
      for (var i = 0; i < slice.length; i++) {
        var post = slice[i];
        var d = document.createElement('div');
        d.className = 'reveal revealed';
        var de = document.createElement('div');
        de.className = 'text-xs text-[#888] dark:text-[#777] mb-2';
        de.textContent = post.date || post.dateDisplay || '';
        d.appendChild(de);
        var a = document.createElement('a');
        a.href = 'blog.html?post=' + post.id;
        a.className = 'block text-xl tracking-tight hover:underline';
        a.textContent = post.title || '';
        d.appendChild(a);
        var pe = document.createElement('p');
        pe.className = 'text-[#666] dark:text-[#aaa] mt-3 text-sm line-clamp-2';
        pe.textContent = post.excerpt || '';
        d.appendChild(pe);
        g.appendChild(d);
      }
    });
  })();
  </script>
</body>
</html>
