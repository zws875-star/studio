<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZWS Studio · 爱寂寞的人</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@400;500&display=swap');

    :root {
      --bg: #F9F7F2;
      --text: #111111;
      --muted: #666666;
      --accent: #3A3A3A;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .serif {
      font-family: 'Noto Serif SC', 'Inter', serif;
    }

    .nav-link {
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: #111111;
    }

    .dark .nav-link:hover {
      color: #ffffff;
    }

    .nav-link:after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: #111111;
      transition: width 0.3s ease;
    }

    .dark .nav-link:after {
      background-color: #ffffff;
    }

    .nav-link:hover:after {
      width: 100%;
    }

    .section-title {
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: #111111;
    }

    .dark .section-title {
      color: #f0f0f0;
    }

    /* Hero animation */
    .hero-content > * {
      opacity: 0;
      transform: translateY(20px);
      animation: heroFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
    .hero-content > *:nth-child(2) { animation-delay: 0.25s; }
    .hero-content > *:nth-child(3) { animation-delay: 0.4s; }
    .hero-content > *:nth-child(4) { animation-delay: 0.55s; }

    @keyframes heroFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#F9F7F2] dark:bg-[#1a1a1a] text-[#111111] dark:text-[#f0f0f0]">

  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-[#F9F7F2]/95 dark:bg-[#1a1a1a]/95 backdrop-blur-md border-b border-[#E5E2D9] dark:border-[#333]">
    <div class="max-w-6xl mx-auto px-8 flex items-center justify-between h-20">
      <div class="flex items-center gap-x-3">
        <a href="index.html" class="text-2xl font-medium tracking-tight">ZWS</a>
        <span class="text-xs px-2 py-0.5 bg-[#111111] dark:bg-white text-white dark:text-[#1a1a1a] rounded">STUDIO</span>
      </div>

      <div class="flex items-center gap-x-9 text-sm">
        <a href="photos.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">照片</a>
        <a href="videos.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">视频</a>
        <a href="blog.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">博客</a>
        <a href="about.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">关于</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="pt-20 max-w-6xl mx-auto px-8 pt-24 pb-16">
    <div class="max-w-3xl hero-content">
      <div class="flex items-center gap-x-3 mb-6">
        <div class="w-2 h-2 bg-[#111111] dark:bg-white rounded-full"></div>
        <span class="uppercase tracking-[3px] text-xs text-[#666666] dark:text-[#888888]">SHANGHAI · CHINA</span>
      </div>

      <h1 class="text-7xl leading-none tracking-tighter font-medium mb-6">
        爱寂寞的人
      </h1>

      <p class="text-2xl text-[#444444] dark:text-[#aaaaaa] leading-tight tracking-tight mb-10 max-w-2xl">
        我用镜头和时间对话。<br>
        摄影 · 视频 · AI 视觉设计
      </p>

      <div class="flex items-center gap-x-4">
        <a href="photos.html" class="minimal-button inline-flex items-center">查看作品</a>
        <a href="about.html" class="text-sm px-5 py-3 text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white transition-colors">了解我</a>
      </div>
    </div>
  </div>

  <!-- Selected Work -->
  <div class="max-w-6xl mx-auto px-8 pb-20">
    <div class="flex items-end justify-between mb-8">
      <div>
        <span class="uppercase tracking-[2px] text-xs text-[#888888] dark:text-[#777777]">SELECTED</span>
        <h2 class="section-title text-3xl tracking-tight">精选作品</h2>
      </div>
      <a href="photos.html" class="text-sm text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white flex items-center gap-x-1 transition-colors">
        查看全部照片 <span>→</span>
      </a>
    </div>

    <!-- Featured Photos Grid (populated from data) -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="featured-works">
      <div class="aspect-[16/10] bg-zinc-100 dark:bg-zinc-800 rounded overflow-hidden animate-pulse"></div>
      <div class="aspect-[16/10] bg-zinc-100 dark:bg-zinc-800 rounded overflow-hidden animate-pulse"></div>
      <div class="aspect-[16/10] bg-zinc-100 dark:bg-zinc-800 rounded overflow-hidden animate-pulse"></div>
    </div>
  </div>

  <!-- Recent Videos -->
  <div class="max-w-6xl mx-auto px-8 pb-20 border-t border-[#E5E2D9] dark:border-[#333] pt-16">
    <div class="flex items-end justify-between mb-8">
      <div>
        <span class="uppercase tracking-[2px] text-xs text-[#888888] dark:text-[#777777]">VIDEO</span>
        <h2 class="section-title text-3xl tracking-tight">最近的视频</h2>
      </div>
      <a href="videos.html" class="text-sm text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white flex items-center gap-x-1 transition-colors">
        全部视频 <span>→</span>
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="recent-videos">
      <div class="aspect-video bg-zinc-100 dark:bg-zinc-800 rounded overflow-hidden animate-pulse"></div>
      <div class="aspect-video bg-zinc-100 dark:bg-zinc-800 rounded overflow-hidden animate-pulse"></div>
      <div class="aspect-video bg-zinc-100 dark:bg-zinc-800 rounded overflow-hidden animate-pulse"></div>
    </div>
  </div>

  <!-- Recent Blog -->
  <div class="max-w-6xl mx-auto px-8 pb-20 border-t border-[#E5E2D9] dark:border-[#333] pt-16">
    <div class="flex items-end justify-between mb-8">
      <div>
        <span class="uppercase tracking-[2px] text-xs text-[#888888] dark:text-[#777777]">WRITING</span>
        <h2 class="section-title text-3xl tracking-tight">最近的思考</h2>
      </div>
      <a href="blog.html" class="text-sm text-[#555555] dark:text-[#aaaaaa] hover:text-black dark:hover:text-white flex items-center gap-x-1 transition-colors">
        全部博客 <span>→</span>
      </a>
    </div>

    <div class="grid md:grid-cols-2 gap-8" id="recent-posts">
      <div class="animate-pulse">
        <div class="h-3 bg-zinc-200 dark:bg-zinc-700 rounded w-24 mb-3"></div>
        <div class="h-5 bg-zinc-200 dark:bg-zinc-700 rounded w-3/4 mb-2"></div>
        <div class="h-4 bg-zinc-200 dark:bg-zinc-700 rounded w-full"></div>
      </div>
      <div class="animate-pulse">
        <div class="h-3 bg-zinc-200 dark:bg-zinc-700 rounded w-24 mb-3"></div>
        <div class="h-5 bg-zinc-200 dark:bg-zinc-700 rounded w-3/4 mb-2"></div>
        <div class="h-4 bg-zinc-200 dark:bg-zinc-700 rounded w-full"></div>
      </div>
    </div>
  </div>

  <footer class="border-t border-[#E5E2D9] dark:border-[#333] py-8 text-xs text-[#888888] dark:text-[#777777]">
    <div class="max-w-6xl mx-auto px-8 flex justify-between">
      <div>&copy; ZWS Studio 2026</div>
      <div>studio2.zws875.com</div>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    async function initHome() {
      const escapeHtml = (s) => {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      };

      // Featured works
      try {
        const allPhotos = await ZWS.loadJSON('data/photos.json');
        const featured = allPhotos.slice(0, 3);
        const grid = document.getElementById('featured-works');
        if (!grid) return;

        grid.innerHTML = '';

        if (!featured.length) {
          grid.innerHTML = '<div class="col-span-full text-center py-12 text-[#888888]">暂无照片</div>';
          return;
        }

        featured.forEach((photo, i) => {
          const div = document.createElement('div');
          div.style.cssText = 'aspect-ratio:16/10;background:#f1f1f1;border-radius:8px;overflow:hidden;cursor:pointer;';
          const img = document.createElement('img');
          img.src = photo.url || '';
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
          img.alt = escapeHtml(photo.caption || '');
          img.loading = 'lazy';
          img.onerror = () => { img.style.display = 'none'; };
          div.appendChild(img);
          div.onclick = () => window.location.href = 'photos.html';
          grid.appendChild(div);
        });
      } catch(e) {
        console.error('Featured works error', e);
        const grid = document.getElementById('featured-works');
        if (grid) grid.innerHTML = '<div class="col-span-full text-center py-12 text-[#888888]">加载失败</div>';
      }

      // Recent videos
      try {
        const allVideos = await ZWS.loadJSON('data/videos.json');
        const recentVideos = allVideos.slice(0, 3);
        const grid = document.getElementById('recent-videos');
        grid.innerHTML = '';
        if (!recentVideos.length) {
          grid.innerHTML = '<div class="col-span-full text-center py-12 text-[#888888]">暂无视频</div>';
        }
        recentVideos.forEach(video => {
          const div = document.createElement('div');
          div.className = 'group cursor-pointer reveal';
          div.innerHTML = `
            <div class="relative aspect-video bg-zinc-900 dark:bg-zinc-800 rounded overflow-hidden mb-3">
              ${video.thumbnail ? `<img src="${video.thumbnail}" class="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-500" alt="${escapeHtml(video.title)}" loading="lazy">` : ''}
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-12 h-12 rounded-full bg-white/90 flex items-center justify-center transition-transform group-hover:scale-110">
                  <div class="w-0 h-0 border-l-[15px] border-l-black border-t-[8px] border-t-transparent border-b-[8px] border-b-transparent ml-1"></div>
                </div>
              </div>
            </div>
            <div class="font-medium tracking-tight">${escapeHtml(video.title)}</div>
            <div class="text-sm text-[#666666] dark:text-[#aaaaaa] mt-1 line-clamp-2">${escapeHtml(video.description)}</div>
          `;
          div.onclick = () => ZWS.openVideoModal(video.embed, video.title);
          grid.appendChild(div);
        });
      } catch(e) {
        console.warn('Recent videos fallback', e);
        const grid = document.getElementById('recent-videos');
        if (grid) grid.innerHTML = '<div class="col-span-full text-center py-12 text-[#888888]">暂无视频</div>';
      }

      // Recent posts
      try {
        const allPosts = await ZWS.loadJSON('data/posts.json');
        const recent = allPosts.slice(0, 2);
        const container = document.getElementById('recent-posts');
        container.innerHTML = '';
        recent.forEach(post => {
          const div = document.createElement('div');
          div.className = 'reveal';
          div.innerHTML = `
            <div class="text-xs text-[#888888] dark:text-[#777777] mb-2">${post.date || post.dateDisplay}</div>
            <a href="blog.html?post=${post.id}" class="block text-xl tracking-tight hover:underline">${post.title}</a>
            <p class="text-[#666666] dark:text-[#aaaaaa] mt-3 text-sm line-clamp-2">${post.excerpt}</p>
          `;
          container.appendChild(div);
        });
      } catch(e) {
        console.warn('Recent posts fallback', e);
        const container = document.getElementById('recent-posts');
        if (container) container.innerHTML = '<div class="text-[#888888]">暂无文章</div>';
      }
    }

    initHome();
  </script>
</body>
</html>
