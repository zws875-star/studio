<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZWS Studio · 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #F9F7F2; --text: #111; --border: #E5E2D9; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    .tab { cursor: pointer; padding: 12px 20px; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { border-bottom-color: #111; font-weight: 600; }
    .tab:hover { border-bottom-color: #888; }
    .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all 0.2s; }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    input, textarea, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus, textarea:focus { border-color: #111; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: 1px solid #111; }
    .btn-primary { background: #111; color: white; border: none; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: transparent; }
    .btn-secondary:hover { background: #111; color: white; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 12px 28px; border-radius: 30px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9998; display: none; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 32px; max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; background: #eee; }
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Login Screen -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="max-w-sm w-full">
    <div class="text-center mb-10">
      <div class="text-4xl font-medium tracking-tight mb-2">ZWS</div>
      <div class="text-xs px-2 py-0.5 bg-[#111] text-white rounded inline-block">STUDIO</div>
      <p class="text-[#666] mt-6 text-sm">管理后台</p>
    </div>
    <div class="bg-white rounded-2xl p-8 border border-[#E5E2D9]">
      <label class="block text-xs tracking-widest text-[#888] mb-2">GitHub 个人访问令牌</label>
      <input id="token-input" type="password" class="mb-4" placeholder="ghp_xxxxxxxxxxxx">
      <p class="text-xs text-[#888] mb-5">需要 <code class="bg-zinc-100 px-1 rounded">repo</code> 权限。<br>
      创建：<a href="https://github.com/settings/tokens" target="_blank" class="underline">github.com/settings/tokens</a></p>
      <button onclick="login()" class="btn btn-primary w-full">登录</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <!-- Header -->
  <div class="border-b border-[#E5E2D9] bg-white/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-16">
      <div class="font-medium tracking-tight">ZWS Studio · 管理后台</div>
      <div class="flex items-center gap-4 text-sm">
        <a href="https://studio.zws875.com" target="_blank" class="text-[#666] hover:text-black">查看网站 →</a>
        <button onclick="logout()" class="text-[#888] hover:text-black text-xs">退出</button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="border-b border-[#E5E2D9]">
    <div class="max-w-6xl mx-auto px-6 flex gap-8 text-sm">
      <div class="tab active" onclick="switchTab('photos', this)">📷 照片</div>
      <div class="tab" onclick="switchTab('videos', this)">🎬 视频</div>
      <div class="tab" onclick="switchTab('posts', this)">📝 博客</div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-6xl mx-auto px-6 py-8">
    <!-- Photos Tab -->
    <div id="tab-photos" class="tab-content"></div>
    <!-- Videos Tab -->
    <div id="tab-videos" class="tab-content" style="display:none;"></div>
    <!-- Posts Tab -->
    <div id="tab-posts" class="tab-content" style="display:none;"></div>
  </div>
</div>

<script>
// ─── Config ────────────────────────────────────────
const REPO = 'zws875-star/studio';
const BRANCH = 'main';
const OWNER = 'zws875-star';
const GITHUB_API = 'https://api.github.com';

let token = '';
let currentTab = 'photos';

// ─── Toast ─────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Login ─────────────────────────────────────────
function login() {
  token = document.getElementById('token-input').value.trim();
  if (!token || !token.startsWith('gh')) {
    toast('请输入有效的 GitHub Token');
    return;
  }
  localStorage.setItem('zws-cms-token', token);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData('photos');
}

function logout() {
  localStorage.removeItem('zws-cms-token');
  token = '';
  location.reload();
}

// Auto login
const savedToken = localStorage.getItem('zws-cms-token');
if (savedToken) {
  token = savedToken;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData('photos');
}

// ─── Tab Switching ────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  loadData(tab);
}

// ─── GitHub API ───────────────────────────────────
async function gh(method, path, body) {
  const opts = {
    method,
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${GITHUB_API}${path}`, opts);
  if (!res.ok) throw new Error(`GitHub API: ${res.status} ${await res.text()}`);
  return res.status === 204 ? null : await res.json();
}

async function getFile(path) {
  const data = await gh('GET', `/repos/${REPO}/contents/${path}?ref=${BRANCH}`);
  return {
    sha: data.sha,
    content: JSON.parse(atob(data.content)),
  };
}

async function saveFile(path, content, sha, message) {
  return gh('PUT', `/repos/${REPO}/contents/${path}`, {
    message: message || `Update ${path}`,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
    sha,
    branch: BRANCH,
  });
}

// ─── Data Loading ─────────────────────────────────
let dataCache = { photos: null, videos: null, posts: null };
let shaCache = {};

async function loadData(type) {
  const files = { photos: 'data/photos.json', videos: 'data/videos.json', posts: 'data/posts.json' };
  const path = files[type];
  const container = document.getElementById(`tab-${type}`);
  container.innerHTML = '<div class="text-center py-12 text-[#888]">加载中...</div>';

  try {
    const { sha, content } = await getFile(path);
    shaCache[type] = sha;
    dataCache[type] = content;
    renderList(type, content);
  } catch(e) {
    container.innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
  }
}

// ─── Render Functions ─────────────────────────────
function renderList(type, data) {
  const container = document.getElementById(`tab-${type}`);
  const labels = { photos: { title: '照片', add: '添加照片', fields: ['标题','图片','日期'] },
                   videos: { title: '视频', add: '添加视频', fields: ['标题','描述','链接','类型','日期'] },
                   posts: { title: '博客', add: '写新文章', fields: ['标题','日期','摘要','正文'] } };
  const l = labels[type];

  let html = `
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl tracking-tight font-medium">${l.title}</h2>
        <p class="text-sm text-[#666] mt-1">共 ${data?.list?.length || 0} 项</p>
      </div>
      <button onclick="showEditor('${type}', -1)" class="btn btn-primary">+ ${l.add}</button>
    </div>
  `;

  if (!data?.list?.length) {
    html += '<div class="empty-state">暂无内容。点击「添加」开始</div>';
    container.innerHTML = html;
    return;
  }

  html += '<div class="grid gap-4">';
  data.list.forEach((item, i) => {
    const title = item.caption || item.title || `项目 ${i+1}`;
    const preview = item.url || item.thumbnail || '';
    html += `
      <div class="card flex items-center gap-4 cursor-pointer" onclick="showEditor('${type}', ${i})">
        ${preview ? `<div class="w-20 h-14 rounded-lg overflow-hidden flex-shrink-0 bg-zinc-100"><img src="${preview}" class="w-full h-full object-cover"></div>` : ''}
        <div class="flex-1 min-w-0">
          <div class="font-medium truncate">${title}</div>
          <div class="text-xs text-[#888] mt-0.5">${item.date || ''} ${item.description ? '· ' + item.description : ''}</div>
        </div>
        <div class="text-[#888] text-lg">→</div>
      </div>
    `;
  });
  html += '</div>';

  container.innerHTML = html;
}

// ─── Editor Modal ─────────────────────────────────
function showEditor(type, index) {
  const data = dataCache[type];
  const item = index >= 0 ? data.list[index] : {};

  const labels = {
    photos: { fields: [
      { key: 'url', label: '图片链接', type: 'text', required: true },
      { key: 'caption', label: '标题', type: 'text', required: true },
      { key: 'date', label: '日期', type: 'text', pattern: '\\d{4}\\.\\d{2}', placeholder: '2026.03' },
    ]},
    videos: { fields: [
      { key: 'title', label: '标题', type: 'text', required: true },
      { key: 'description', label: '描述', type: 'text' },
      { key: 'thumbnail', label: '缩略图链接', type: 'text' },
      { key: 'embed', label: '视频链接', type: 'text', required: true },
      { key: 'type', label: '类型', type: 'select', options: ['youtube','vimeo','local'] },
      { key: 'date', label: '日期', type: 'text', pattern: '\\d{4}\\.\\d{2}', placeholder: '2026.03' },
    ]},
    posts: { fields: [
      { key: 'title', label: '文章标题', type: 'text', required: true },
      { key: 'date', label: '日期', type: 'text', required: true, placeholder: '2026.06.12' },
      { key: 'dateDisplay', label: '显示日期', type: 'text', placeholder: '2026 年 6 月 12 日' },
      { key: 'excerpt', label: '摘要', type: 'textarea', required: true },
      { key: 'content', label: '正文段落', type: 'list' },
    ]},
  };
  const config = labels[type];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  let fieldsHtml = '';
  config.fields.forEach(f => {
    if (f.type === 'list') {
      const paragraphs = item[f.key] || [''];
      let listHtml = paragraphs.map((p, i) => `
        <div class="flex gap-2 mb-2">
          <textarea class="flex-1" rows="3" data-list="${f.key}" data-idx="${i}">${p}</textarea>
          ${i > 0 ? '<button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-lg">×</button>' : ''}
        </div>
      `).join('');
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <div id="list-${f.key}">${listHtml}</div>
          <button onclick="addParagraph('${f.key}')" class="text-xs text-[#888] hover:text-black mt-1">+ 添加段落</button>
        </div>
      `;
    } else if (f.type === 'select') {
      const opts = f.options.map(o => `<option ${item[f.key] === o ? 'selected' : ''}>${o}</option>`).join('');
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <select data-key="${f.key}">${opts}</select>
        </div>
      `;
    } else if (f.type === 'textarea') {
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <textarea data-key="${f.key}" rows="3" ${f.required ? 'required' : ''}>${item[f.key] || ''}</textarea>
        </div>
      `;
    } else {
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <input type="text" data-key="${f.key}" value="${item[f.key] || ''}" ${f.required ? 'required' : ''} placeholder="${f.placeholder || ''}">
        </div>
      `;
    }
  });

  overlay.innerHTML = `
    <div class="modal-content">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-medium">${index >= 0 ? '编辑' : '添加'}${labels[type].title}</h3>
        <button onclick="this.closest('.modal-overlay').remove()" class="text-2xl text-[#888] hover:text-black">×</button>
      </div>
      ${fieldsHtml}
      <div class="flex gap-3 mt-8">
        <button onclick="saveItem('${type}', ${index})" class="btn btn-primary flex-1">保存</button>
        ${index >= 0 ? `<button onclick="deleteItem('${type}', ${index})" class="px-6 py-2.5 text-sm text-red-500 hover:text-red-700">删除</button>` : ''}
        <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-secondary flex-1">取消</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function addParagraph(key) {
  const container = document.getElementById(`list-${key}`);
  const div = document.createElement('div');
  div.className = 'flex gap-2 mb-2';
  div.innerHTML = `<textarea class="flex-1" rows="3" data-list="${key}"></textarea>
    <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-lg">×</button>`;
  container.appendChild(div);
}

function collectFormData(type, modal) {
  const files = { photos: 'data/photos.json', videos: 'data/videos.json', posts: 'data/posts.json' };
  const path = files[type];
  const labels = { photos: 'photos', videos: 'videos', posts: 'posts' };

  const data = dataCache[type];

  // Get list fields
  const listFields = ['photos','videos'].includes(type) ? [] : ['content'];
  const obj = {};

  modal.querySelectorAll('input[data-key], textarea[data-key], select[data-key]').forEach(el => {
    obj[el.dataset.key] = el.value;
  });

  // Collect list (paragraph) fields
  listFields.forEach(key => {
    const items = [];
    modal.querySelectorAll(`[data-list="${key}"]`).forEach(el => {
      if (el.value.trim()) items.push(el.value);
    });
    if (items.length) obj[key] = items;
  });

  return obj;
}

async function saveItem(type, index) {
  const modal = document.querySelector('.modal-overlay.active');
  const data = dataCache[type];
  const obj = collectFormData(type, modal);

  if (index >= 0) {
    data.list[index] = { ...data.list[index], ...obj };
  } else {
    data.list.push(obj);
  }

  const files = { photos: 'data/photos.json', videos: 'data/videos.json', posts: 'data/posts.json' };
  const path = files[type];

  try {
    const msg = index >= 0 ? `Edit ${type} item` : `Add ${type} item`;
    await saveFile(path, data, shaCache[type], msg);
    toast('✅ 已保存');
    modal.remove();
    loadData(type);
  } catch(e) {
    toast('❌ 保存失败: ' + e.message);
  }
}

async function deleteItem(type, index) {
  if (!confirm('确定删除？')) return;
  const data = dataCache[type];
  data.list.splice(index, 1);

  const files = { photos: 'data/photos.json', videos: 'data/videos.json', posts: 'data/posts.json' };
  const path = files[type];

  try {
    await saveFile(path, data, shaCache[type], `Delete ${type} item`);
    toast('✅ 已删除');
    document.querySelector('.modal-overlay.active')?.remove();
    loadData(type);
  } catch(e) {
    toast('❌ 删除失败: ' + e.message);
  }
}
</script>
</body>
</html>
