<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZWS Studio · 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #F9F7F2; --text: #111; --border: #E5E2D9; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    .tab { cursor: pointer; padding: 12px 20px; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { border-bottom-color: #111; font-weight: 600; }
    .tab:hover { border-bottom-color: #888; }
    .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all 0.2s; }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    input, textarea, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: white; }
    input:focus, textarea:focus { border-color: #111; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: 1px solid #111; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #111; color: white; border: none; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: transparent; }
    .btn-secondary:hover { background: #111; color: white; }
    .btn-danger { background: transparent; color: #e74c3c; border-color: #e74c3c; }
    .btn-danger:hover { background: #e74c3c; color: white; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 12px 28px; border-radius: 30px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9998; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 32px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .upload-area:hover { border-color: #111; background: #fafafa; }
    .upload-area.dragover { border-color: #111; background: #f0f0f0; }
    .upload-area.has-image { padding: 8px; border-style: solid; border-color: #ddd; }
    .upload-area img { max-height: 160px; border-radius: 8px; }
    .progress-bar { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
    .progress-bar.active { display: block; }
    .progress-bar-fill { height: 100%; background: #111; width: 0%; transition: width 0.3s; border-radius: 2px; }
    .preview-img { max-width: 100%; max-height: 200px; border-radius: 8px; object-fit: contain; }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Login -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="max-w-sm w-full">
    <div class="text-center mb-10">
      <div class="text-4xl font-medium tracking-tight mb-2">ZWS</div>
      <div class="text-xs px-2 py-0.5 bg-[#111] text-white rounded inline-block">STUDIO</div>
      <p class="text-[#666] mt-6 text-sm">管理后台</p>
    </div>
    <div class="bg-white rounded-2xl p-8 border border-[#E5E2D9]">
      <label class="block text-xs tracking-widest text-[#888] mb-2">GitHub 个人访问令牌</label>
      <input id="token-input" type="password" class="mb-4" placeholder="ghp_...">
      <p class="text-xs text-[#888] mb-5">需要 <code class="bg-zinc-100 px-1 rounded">repo</code> 权限。<br>创建：<a href="https://github.com/settings/tokens" target="_blank" class="underline">github.com/settings/tokens</a></p>
      <button onclick="login()" class="btn btn-primary w-full justify-center">登录</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <div class="border-b border-[#E5E2D9] bg-white/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-16">
      <div class="font-medium tracking-tight">ZWS Studio · 管理后台</div>
      <div class="flex items-center gap-4 text-sm">
        <a href="https://studio2.zws875.com" target="_blank" class="text-[#666] hover:text-black">查看网站 →</a>
        <button onclick="logout()" class="text-[#888] hover:text-black text-xs">退出</button>
      </div>
    </div>
  </div>

  <div class="border-b border-[#E5E2D9]">
    <div class="max-w-6xl mx-auto px-6 flex gap-8 text-sm">
      <div class="tab active" onclick="switchTab('photos', this)">📷 照片</div>
      <div class="tab" onclick="switchTab('videos', this)">🎬 视频</div>
      <div class="tab" onclick="switchTab('posts', this)">📝 博客</div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-8">
    <div id="tab-photos" class="tab-content"></div>
    <div id="tab-videos" class="tab-content" style="display:none;"></div>
    <div id="tab-posts" class="tab-content" style="display:none;"></div>
  </div>
</div>

<script>
// ─── Config ────────────────────────────────────────
const REPO = 'zws875-star/studio';
const BRANCH = 'main';
const GITHUB_API = 'https://api.github.com';
const SITE_URL = 'https://studio2.zws875.com';

let token = '';
let currentTab = 'photos';

// ─── Toast ─────────────────────────────────────────
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#c0392b' : '#111';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Login ─────────────────────────────────────────
function login() {
  token = document.getElementById('token-input').value.trim();
  if (!token || !token.startsWith('gh')) {
    toast('请输入有效的 GitHub Token（以 ghp_ 或 gho_ 开头）', true);
    return;
  }
  localStorage.setItem('zws-cms-token', token);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData('photos');
}

function logout() {
  localStorage.removeItem('zws-cms-token');
  token = '';
  location.reload();
}

const savedToken = localStorage.getItem('zws-cms-token');
if (savedToken) {
  token = savedToken;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData('photos');
}

// ─── Tab Switching ────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  loadData(tab);
}

// ─── GitHub API ───────────────────────────────────
async function gh(method, path, body) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000); // 30s timeout
  try {
    const opts = {
      method,
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      signal: controller.signal,
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${GITHUB_API}${path}`, opts);
    if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text()}`);
    return res.status === 204 ? null : await res.json();
  } finally {
    clearTimeout(timeout);
  }
}

async function getFile(path) {
  const data = await gh('GET', `/repos/${REPO}/contents/${path}?ref=${BRANCH}`);
  return { sha: data.sha, content: JSON.parse(atob(data.content)) };
}

function toBase64(str) {
  // Unicode-safe base64 encoding
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

async function saveFile(path, content, sha, message) {
  // Write flat array (content.list || content) for front-end compatibility
  const saveData = content && content.list ? content.list : content;
  
  // Try saving; if SHA conflict (409), re-fetch latest SHA and retry once
  let currentSha = sha;
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const jsonStr = JSON.stringify(saveData, null, 2);
      const encoded = toBase64(jsonStr);
      await gh('PUT', `/repos/${REPO}/contents/${path}`, {
        message: message || `Update ${path}`,
        content: encoded,
        sha: currentSha,
        branch: BRANCH,
      });
      return; // success
    } catch (e) {
      if (attempt === 1 || !e.message.startsWith('GitHub API 409')) {
        throw e;
      }
      // SHA conflict: re-fetch latest sha and retry once
      try {
        const fresh = await gh('GET', `/repos/${REPO}/contents/${path}?ref=${BRANCH}`);
        currentSha = fresh.sha;
        // Update sha cache so next save won't conflict again
        const type = Object.entries({photos:'data/photos.json',videos:'data/videos.json',posts:'data/posts.json'}).find(([,p]) => p === path)?.[0];
        if (type) shaCache[type] = fresh.sha;
        // continue loop to retry
      } catch (fetchError) {
        throw new Error('SHA冲突，自动重试时获取数据失败');
      }
    }
  }
}

// ─── File Upload to GitHub ──────────────────────────

async function uploadFile(localFile, repoPath) {
  // Read file as base64
  const b64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    const rTimeout = setTimeout(() => { reader.abort?.(); reject(new Error('读取文件超时')); }, 15000);
    reader.onload = () => {
      clearTimeout(rTimeout);
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = () => { clearTimeout(rTimeout); reject(new Error('读取文件失败')); };
    reader.readAsDataURL(localFile);
  });

  // Check if file already exists (get sha)
  let existingSha = null;
  try {
    const existing = await gh('GET', `/repos/${REPO}/contents/${repoPath}?ref=${BRANCH}`);
    existingSha = existing.sha;
  } catch(e) { /* new file, that's fine */ }

  // Upload via GitHub API (no sha to avoid 409 on existing file from another session)
  await gh('PUT', `/repos/${REPO}/contents/${repoPath}`, {
    message: `Upload ${localFile.name}`,
    content: b64,
    sha: existingSha || undefined,
    branch: BRANCH,
  });

  // Use raw GitHub URL for reliable access (no DNS propagation dependency)
  return `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${repoPath}`;
}

// ─── Data Loading ─────────────────────────────────
let dataCache = { photos: null, videos: null, posts: null };
let shaCache = {};

async function loadData(type) {
  const files = { photos: 'data/photos.json', videos: 'data/videos.json', posts: 'data/posts.json' };
  const path = files[type];
  const container = document.getElementById(`tab-${type}`);
  container.innerHTML = '<div class="text-center py-12 text-[#888]">加载中...</div>';

  try {
    const { sha, content } = await getFile(path);
    shaCache[type] = sha;
    
    // Normalize: if content is a flat array (old format), wrap in {list: [...]}
    let normalized = content;
    if (Array.isArray(content)) {
      normalized = { list: content };
    } else if (!content || !content.list) {
      normalized = { list: [] };
    }
    
    dataCache[type] = normalized;
    renderList(type, normalized);
  } catch(e) {
    console.error('loadData error:', e);
    container.innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    // Initialize with empty list so save doesn't crash
    dataCache[type] = { list: [] };
  }
}

// ─── Render ───────────────────────────────────────
function renderList(type, data) {
  const container = document.getElementById(`tab-${type}`);
  const labels = { photos: { title: '照片', add: '添加照片' },
                   videos: { title: '视频', add: '添加视频' },
                   posts: { title: '博客', add: '写新文章' } };
  const l = labels[type];

  let html = `
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl tracking-tight font-medium">${l.title}</h2>
        <p class="text-sm text-[#666] mt-1">共 ${data?.list?.length || 0} 项</p>
      </div>
      <button onclick="showEditor('${type}', -1)" class="btn btn-primary">+ ${l.add}</button>
    </div>
  `;

  if (!data?.list?.length) {
    html += '<div class="empty-state">暂无内容。点击添加开始</div>';
    container.innerHTML = html; return;
  }

  html += '<div class="grid gap-4">';
  data.list.forEach((item, i) => {
    const title = item.caption || item.title || `项目 ${i+1}`;
    const preview = item.url || item.thumbnail || '';
    html += `
      <div class="card flex items-center gap-4 cursor-pointer" onclick="showEditor('${type}', ${i})">
        ${preview ? `<div class="w-20 h-14 rounded-lg overflow-hidden flex-shrink-0 bg-zinc-100"><img src="${preview}" class="w-full h-full object-cover" onerror="this.style.display=\'none\'"></div>` : ''}
        <div class="flex-1 min-w-0">
          <div class="font-medium truncate">${escapeHtml(title)}</div>
          <div class="text-xs text-[#888] mt-0.5">${item.date || ''} ${item.description ? '· ' + escapeHtml(item.description) : ''}</div>
        </div>
        <div class="text-[#888] text-lg">→</div>
      </div>
    `;
  });
  html += '</div>';
  container.innerHTML = html;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ─── Image Upload Component ──────────────────────────

function createUploader(currentUrl, label, key) {
  const div = document.createElement('div');
  div.innerHTML = `
    <label class="block text-xs tracking-widest text-[#888] mb-1.5">${label}</label>
    <div class="upload-area" id="upload-${key}">
      ${currentUrl ? `<img src="${currentUrl}" class="preview-img" onerror="this.outerHTML='<div class=\\'text-sm text-[#888]\\'>图片加载失败</div>'">` : '<div class="text-sm text-[#888]">点击或拖拽图片到此处上传</div>'}
    </div>
    <input type="file" id="file-${key}" accept="image/*" style="display:none">
    <div class="progress-bar" id="progress-${key}"><div class="progress-bar-fill"></div></div>
    <div class="flex items-center gap-2 mt-2">
      <input type="text" id="url-${key}" value="${currentUrl || ''}" placeholder="或输入图片链接地址" class="text-sm flex-1">
      ${currentUrl ? `<button onclick="document.getElementById('url-${key}').value='';document.getElementById('upload-${key}').innerHTML='<div class=\\'text-sm text-[#888]\\'>点击上传新图片</div>'" class="text-xs text-[#888] hover:text-red-500">清除</button>` : ''}
    </div>
    <input type="hidden" id="result-${key}" value="${currentUrl || ''}">
  `;

  const area = div.querySelector(`#upload-${key}`);
  const fileInput = div.querySelector(`#file-${key}`);
  const urlInput = div.querySelector(`#url-${key}`);
  const resultInput = div.querySelector(`#result-${key}`);

  // Click to upload
  area.onclick = (e) => {
    if (e.target.tagName !== 'IMG' && !e.target.closest('.btn')) {
      fileInput.click();
    }
  };

  // Drag and drop
  area.ondragover = (e) => { e.preventDefault(); area.classList.add('dragover'); };
  area.ondragleave = () => area.classList.remove('dragover');
  area.ondrop = (e) => {
    e.preventDefault();
    area.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0], area, fileInput, urlInput, resultInput, key);
  };

  // File selection
  fileInput.onchange = () => {
    if (fileInput.files.length) handleFile(fileInput.files[0], area, fileInput, urlInput, resultInput, key);
  };

  // Manual URL
  urlInput.oninput = () => {
    const val = urlInput.value.trim();
    resultInput.value = val;
    if (val) {
      area.innerHTML = `<img src="${val}" class="preview-img" onerror="this.outerHTML='<div class=\\'text-sm text-[#e74c3c]\\'>图片无法加载，检查链接是否正确</div>'">`;
      area.classList.add('has-image');
    } else {
      area.innerHTML = '<div class="text-sm text-[#888]">点击或拖拽图片到此处上传</div>';
      area.classList.remove('has-image');
    }
  };

  return div;
}

async function handleFile(file, area, fileInput, urlInput, resultInput, key) {
  // Validate type
  if (!file.type.startsWith('image/')) {
    toast('请选择图片文件', true); return;
  }
  // Limit file size to 10MB (GitHub API has a 25MB limit for raw content)
  if (file.size > 10 * 1024 * 1024) {
    toast('图片不能超过 10MB', true); return;
  }

  // Show uploading state
  area.innerHTML = `<div class="text-sm text-[#888]">上传中... ${file.name}</div>`;
  area.classList.add('has-image');
  const progressBar = document.getElementById(`progress-${key}`);
  progressBar.classList.add('active');
  progressBar.querySelector('.progress-bar-fill').style.width = '50%';

  try {
    // Generate unique filename
    const ext = file.name.split('.').pop() || 'jpg';
    const ts = Date.now();
    const repoPath = `images/uploads/${ts}.${ext}`;

    // Upload to GitHub
    const url = await uploadFile(file, repoPath);

    // Update
    progressBar.querySelector('.progress-bar-fill').style.width = '100%';
    setTimeout(() => { progressBar.classList.remove('active'); progressBar.querySelector('.progress-bar-fill').style.width = '0%'; }, 500);

    area.innerHTML = `<img src="${url}" class="preview-img">`;
    urlInput.value = url;
    resultInput.value = url;
    toast('✅ 图片已上传');
  } catch(e) {
    toast('❌ 上传失败: ' + e.message, true);
    progressBar.classList.remove('active');
    area.innerHTML = '<div class="text-sm text-[#888]">上传失败，点击重试</div>';
  }
}

// ─── Editor Modal ─────────────────────────────────

function showEditor(type, index) {
  const data = dataCache[type];
  const item = index >= 0 ? { ...data.list[index] } : {};

  const fieldsConfig = {
    photos: [
      { key: 'caption', label: '标题', type: 'text', required: true },
      { key: 'url', label: '图片', type: 'image' },
      { key: 'date', label: '日期', type: 'text', pattern: '\\d{4}\\.\\d{2}', placeholder: '2026.03' },
    ],
    videos: [
      { key: 'title', label: '标题', type: 'text', required: true },
      { key: 'description', label: '描述', type: 'text' },
      { key: 'thumbnail', label: '缩略图', type: 'image' },
      { key: 'embed', label: '视频链接', type: 'text', required: true, placeholder: 'https://youtube.com/...' },
      { key: 'type', label: '类型', type: 'select', options: ['youtube','vimeo','local'] },
      { key: 'date', label: '日期', type: 'text', pattern: '\\d{4}\\.\\d{2}', placeholder: '2026.03' },
    ],
    posts: [
      { key: 'title', label: '文章标题', type: 'text', required: true },
      { key: 'date', label: '日期', type: 'text', required: true, placeholder: '2026.06.12' },
      { key: 'dateDisplay', label: '显示日期', type: 'text', placeholder: '2026 年 6 月 12 日' },
      { key: 'excerpt', label: '摘要', type: 'textarea', required: true },
      { key: 'content', label: '正文', type: 'paragraphs' },
    ],
  };

  const config = fieldsConfig[type];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  let fieldsHtml = '';
  let uploaders = [];

  config.forEach(f => {
    if (f.type === 'image') {
      // Will append after building html
      uploaders.push(f);
    } else if (f.type === 'paragraphs') {
      const paragraphs = item[f.key] || [''];
      let listHtml = paragraphs.map((p, i) => `
        <div class="flex gap-2 mb-2 items-start">
          <textarea class="flex-1" rows="3" data-list="${f.key}" data-idx="${i}" style="min-height:70px">${escapeHtml(p)}</textarea>
          ${i > 0 ? '<button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-xl leading-none mt-2">×</button>' : ''}
        </div>
      `).join('');
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <div id="list-${f.key}">${listHtml}</div>
          <div class="flex gap-2 mt-1">
            <button onclick="addParagraph('${f.key}')" class="text-xs text-[#888] hover:text-black">+ 添加段落</button>
          </div>
          <div class="mt-3 pt-3 border-t border-[#eee]">
            <label class="block text-xs tracking-widest text-[#888] mb-1.5">导入文本文件 (.txt)</label>
            <input type="file" accept=".txt" onchange="importTextFile(this, '${f.key}')" class="text-sm">
            <p class="text-xs text-[#888] mt-1">每空行视为段落分隔</p>
          </div>
        </div>
      `;
    } else if (f.type === 'select') {
      const opts = f.options.map(o => `<option ${item[f.key] === o ? 'selected' : ''} value="${o}">${o}</option>`).join('');
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <select data-key="${f.key}">${opts}</select>
        </div>
      `;
    } else if (f.type === 'textarea') {
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <textarea data-key="${f.key}" rows="3" ${f.required ? 'required' : ''}>${escapeHtml(item[f.key] || '')}</textarea>
        </div>
      `;
    } else {
      fieldsHtml += `
        <div class="mb-4">
          <label class="block text-xs tracking-widest text-[#888] mb-1.5">${f.label}</label>
          <input type="text" data-key="${f.key}" value="${escapeHtml(item[f.key] || '')}" ${f.required ? 'required' : ''} placeholder="${f.placeholder || ''}">
        </div>
      `;
    }
  });

  // Build modal HTML
  overlay.innerHTML = `
    <div class="modal-content">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-medium">${index >= 0 ? '编辑' : '添加'}${['照片','视频','博客'][['photos','videos','posts'].indexOf(type)]}</h3>
        <button onclick="this.closest('.modal-overlay').remove()" class="text-2xl text-[#888] hover:text-black cursor-pointer">×</button>
      </div>
      <div id="modal-fields">${fieldsHtml}</div>
      <div class="flex gap-3 mt-8 pt-4 border-t border-[#eee]">
        <button onclick="saveItem('${type}', ${index})" class="btn btn-primary flex-1 justify-center" id="save-btn">保存</button>
        ${index >= 0 ? `<button onclick="deleteItem('${type}', ${index})" class="btn btn-danger">删除</button>` : ''}
        <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-secondary flex-1 justify-center">取消</button>
      </div>
    </div>
  `;

  // Append uploaders after modal is in DOM
  document.body.appendChild(overlay);

  uploaders.forEach(f => {
    const fieldsDiv = document.getElementById('modal-fields');
    const uploadContainer = document.createElement('div');
    uploadContainer.className = 'mb-4';
    uploadContainer.appendChild(createUploader(item[f.key] || '', f.label, f.key));
    // Insert after the caption field for photos, or at top for videos
    const firstField = fieldsDiv.querySelector('.mb-4');
    if (firstField && (f.key === 'thumbnails' || type === 'photos')) {
      fieldsDiv.insertBefore(uploadContainer, firstField.nextSibling);
    } else {
      fieldsDiv.prepend(uploadContainer);
    }
  });
}

// ─── Text File Import ──────────────────────────────
function importTextFile(input, listKey) {
  const file = input.files[0];
  if (!file) return;

  if (!file.name.endsWith('.txt') && file.type !== 'text/plain') {
    toast('只支持 .txt 文件', true); return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    // Split by blank lines
    const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);

    if (paragraphs.length === 0) {
      toast('文件内容为空', true); return;
    }

    // Replace the paragraph list
    const container = document.getElementById(`list-${listKey}`);
    container.innerHTML = paragraphs.map((p, i) => `
      <div class="flex gap-2 mb-2 items-start">
        <textarea class="flex-1" rows="3" data-list="${listKey}" data-idx="${i}" style="min-height:70px">${escapeHtml(p)}</textarea>
        ${i > 0 ? '<button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-xl leading-none mt-2">×</button>' : ''}
      </div>
    `).join('');

    toast(`✅ 已导入 ${paragraphs.length} 个段落`);
    input.value = '';
  };
  reader.readAsText(file);
}

function addParagraph(key) {
  const container = document.getElementById(`list-${key}`);
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'flex gap-2 mb-2 items-start';
  div.innerHTML = `<textarea class="flex-1" rows="3" data-list="${key}" style="min-height:70px"></textarea>
    <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-xl leading-none mt-2">×</button>`;
  container.appendChild(div);
}

// ─── Save / Delete ─────────────────────────────────

function collectFormData(type, modal) {
  const obj = {};

  modal.querySelectorAll('input[data-key]').forEach(el => { obj[el.dataset.key] = el.value; });
  modal.querySelectorAll('textarea[data-key]').forEach(el => { obj[el.dataset.key] = el.value; });
  modal.querySelectorAll('select[data-key]').forEach(el => { obj[el.dataset.key] = el.value; });

  // Collect paragraph lists by iterating children in DOM order
  modal.querySelectorAll('[id^="list-"]').forEach(container => {
    const key = container.id.replace('list-', '');
    const textareas = container.querySelectorAll('textarea');
    const values = [];
    textareas.forEach(ta => {
      const v = ta.value.trim();
      if (v) values.push(v);
    });
    if (values.length > 0) obj[key] = values;
  });

  // Collect uploader results
  modal.querySelectorAll('input[id^="result-"]').forEach(el => {
    const key = el.id.replace('result-', '');
    if (el.value) obj[key] = el.value;
  });

  return obj;
}

async function saveItem(type, index) {
  const modal = document.querySelector('.modal-overlay.active');
  const data = dataCache[type];
  const obj = collectFormData(type, modal);

  // Validate required fields
  const required = ['caption','title'];
  for (const r of required) {
    if (r in obj && !obj[r]) { toast(`请填写${r === 'caption' ? '标题' : r}`, true); return; }
  }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中...';

  if (index >= 0) {
    data.list[index] = { ...data.list[index], ...obj };
  } else {
    data.list.push(obj);
  }

  const files = { photos: 'data/photos.json', videos: 'data/videos.json', posts: 'data/posts.json' };
  const path = files[type];

  try {
    // Add explicit timeout to prevent permanent "保存中..." hang
    const savePromise = saveFile(path, data, shaCache[type], index >= 0 ? `Edit ${type}` : `Add ${type}`);
    const timeoutPromise = new Promise((_, reject) => 
      setTimeout(() => reject(new Error('保存超时（45秒）')), 45000)
    );
    
    await Promise.race([savePromise, timeoutPromise]);
    toast('✅ 已保存');
    modal.remove();
    loadData(type);
  } catch(e) {
    console.error('Save error:', e);
    let msg = e.message;
    if (msg.includes('409')) msg = 'SHA冲突，已自动重试失败。请刷新页面重试';
    if (msg.includes('401') || msg.includes('403')) msg = 'GitHub Token无效或权限不足。请重新登录';
    if (msg.includes('timeout') || msg.includes('超时')) msg = '保存超时（可能是网络问题或 Token 过期）';
    toast('❌ ' + msg, true);
    btn.disabled = false; 
    btn.textContent = '保存';
  }
}

async function deleteItem(type, index) {
  if (!confirm('确定删除？此操作不可撤销。')) return;

  const data = dataCache[type];
  data.list.splice(index, 1);

  const files = { photos: 'data/photos.json', videos: 'data/videos.json', posts: 'data/posts.json' };
  const path = files[type];

  try {
    await saveFile(path, data, shaCache[type], `Delete ${type} item`);
    toast('✅ 已删除');
    document.querySelector('.modal-overlay.active')?.remove();
    loadData(type);
  } catch(e) {
    toast('❌ 删除失败: ' + e.message, true);
  }
}
