<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频 · ZWS875</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body class="bg-[#F9F7F2] dark:bg-[#1a1a1a] text-[#111111] dark:text-[#f0f0f0]">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-[#F9F7F2]/95 dark:bg-[#1a1a1a]/95 backdrop-blur-md border-b border-[#E5E2D9] dark:border-[#333]">
    <div class="max-w-6xl mx-auto px-8 flex items-center justify-between h-20">
      <div class="flex items-center gap-x-3">
        <a href="index.html" class="site-brand" aria-label="ZWS875 首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="presentation" focusable="false" aria-hidden="true">
              <path class="mark-zs" d="M6 8h29L12 24h28L17 40h25"></path>
              <path class="mark-w" d="M7 8l9 32 8-19 8 19L41 8"></path>
            </svg>
          </span>
          <span class="brand-copy" aria-hidden="true">
            <span class="brand-word">ZWS</span>
            <span class="brand-num">875</span>
          </span>
        </a>
      </div>
      <div class="flex items-center gap-x-9 text-sm">
        <a href="photos.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">照片</a>
        <a href="videos.html" class="nav-link text-black dark:text-white font-medium">视频</a>
        <a href="blog.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">博客</a>
        <a href="about.html" class="nav-link text-[#555555] dark:text-[#aaaaaa]">关于</a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-8 pt-24 pb-16">
    <div class="mb-10 flex items-end justify-between reveal">
      <div>
        <span class="uppercase tracking-[3px] text-xs text-[#888888] dark:text-[#777777]">MOVING IMAGE</span>
        <h1 class="text-5xl tracking-tight font-medium mt-1">视频</h1>
        <p class="mt-3 text-[#555555] dark:text-[#aaaaaa] max-w-md">缓慢的镜头，安静的叙事。</p>
      </div>
    </div>

    <!-- Video Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="video-grid">
      <!-- Populated by JS -->
    </div>
  </div>

  <footer class="border-t border-[#E5E2D9] dark:border-[#333] py-8 text-xs text-[#888888] dark:text-[#777777]">
    <div class="max-w-6xl mx-auto px-8 flex justify-between">
      <div>&copy; ZWS875 2026</div>
      <div>studio2.zws875.com</div>
    </div>
  </footer>

  <script src="main.js?v=4"></script>
  <script>
    let videos = [];

    async function initVideos() {
      try {
        videos = await ZWS.loadJSON('data/videos.json');
      } catch(e) {
        console.warn('Failed to load videos.json');
        videos = [];
      }
      renderVideos();
    }

    function renderVideos() {
      const grid = document.getElementById('video-grid');
      grid.innerHTML = '';

      const publishedVideos = videos.filter(video => video.published !== false);
      if (!publishedVideos.length) {
        grid.innerHTML = '<div class="col-span-full text-center py-16 text-[#888888]">暂无视频</div>';
        return;
      }

      publishedVideos.forEach(video => {
        const card = document.createElement('div');
        card.className = 'group cursor-pointer reveal revealed';
        card.innerHTML = `
          <div class="relative aspect-video bg-zinc-900 dark:bg-zinc-800 rounded-xl overflow-hidden mb-4">
            ${video.thumbnail ? `<img src="${ZWS.assetUrl(video.thumbnail)}" class="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-500" alt="${video.title}" loading="lazy">` : ''}
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-14 h-14 rounded-full bg-white/90 flex items-center justify-center transition-transform group-hover:scale-110">
                <div class="w-0 h-0 border-l-[18px] border-l-black border-t-[10px] border-t-transparent border-b-[10px] border-b-transparent ml-1"></div>
              </div>
            </div>
          </div>
          <div>
            <div class="font-medium tracking-tight">${video.title}</div>
            <div class="text-sm text-[#666666] dark:text-[#aaaaaa] mt-1">${video.description}</div>
          </div>
        `;

        card.onclick = () => {
          ZWS.openVideoModal(ZWS.videoUrl(video), video.title);
        };

        grid.appendChild(card);
      });
    }

    initVideos();
  </script>
</body>
</html>
